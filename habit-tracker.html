<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Habits" />
  <title>Habit Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { background: #000; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif; overscroll-behavior: none; }
    input, textarea { font-family: inherit; }
    button { font-family: inherit; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const ACCENT = "#00E5A0";
    const BG = "#000000";
    const CARD = "#1C1C1E";
    const CARD2 = "#2C2C2E";
    const STORAGE_KEY = "habit-tracker-v1";

    function getTodayStr() {
      return new Date().toISOString().split("T")[0];
    }

    function calcStreak(completions, freq, days) {
      if (!completions || completions.length === 0) return 0;
      const today = getTodayStr();

      function isScheduled(dateStr) {
        if (!freq || freq === "daily" || !days || days.length === 0) return true;
        const dow = new Date(dateStr).getDay() === 0 ? 6 : new Date(dateStr).getDay() - 1;
        return days.includes(dow);
      }

      // Walk backwards day by day:
      // - Scheduled day not checked → streak breaks (except today)
      // - Scheduled day checked → streak++
      // - Non-scheduled day checked → streak++ (bonus)
      // - Non-scheduled day not checked → skip (no break)
      let cursor = new Date(today);
      let streak = 0;

      for (let i = 0; i < 400; i++) {
        const dateStr = cursor.toISOString().split("T")[0];
        const checked = completions.includes(dateStr);
        const scheduled = isScheduled(dateStr);

        if (checked) {
          // Always count checked days (scheduled or not)
          streak++;
        } else if (scheduled) {
          // Missed a scheduled day
          if (i === 0) {
            // Today not yet checked — still alive, keep going
          } else {
            // Missed scheduled day in the past → break
            break;
          }
        }
        // Non-scheduled + not checked → just skip

        cursor.setDate(cursor.getDate() - 1);
      }
      return streak;
    }

    function calcLongestStreak(completions) {
      if (!completions || completions.length === 0) return 0;
      const sorted = [...new Set(completions)].sort();
      let longest = 1, current = 1;
      for (let i = 1; i < sorted.length; i++) {
        const a = new Date(sorted[i - 1]), b = new Date(sorted[i]);
        const diff = Math.floor((b - a) / 86400000);
        if (diff === 1) { current++; longest = Math.max(longest, current); }
        else current = 1;
      }
      return longest;
    }

    const EMOJIS = ["💧","🏃","📚","🧘","🍎","💪","✍️","🎯","🌿","😴","🧠","🎵","🚴","🥗","🌅"];
    const ALL_EMOJIS = [
      "😀","😃","😄","😁","😆","😎","🥳","🤩","😍","🥰",
      "💪","🏃","🚶","🧘","🤸","🏋️","⛹️","🚴","🏊","🧗",
      "💧","🥤","☕","🍵","🥛","🍎","🥗","🥦","🍳","🥑",
      "📚","✍️","📝","🎯","🏆","⭐","🌟","💡","🔥","⚡",
      "🌅","🌄","🌿","🌱","🌳","🍃","☀️","🌙","❄️","🌈",
      "🎵","🎶","🎸","🎹","🎨","🖌️","📷","🎬","🎮","🎲",
      "😴","💤","🛌","🧠","❤️","💙","💚","💛","🧡","💜",
      "🐶","🐱","🦁","🦊","🐻","🐼","🐨","🦋","🐦","🌸",
      "✅","☑️","🎁","🏅","🥇","🎖️","🏵️","🎗️","🔑","🗝️",
      "🚀","✈️","🌍","🗺️","⛰️","🏖️","🏕️","🌊","🎿","⚽"
    ];
    const COLORS = ["#00C2A8","#00B4D8","#FF6B6B","#FFD93D","#C77DFF","#FF9F43","#F8A5C2","#48DBFB"];
    const DAY_LABELS = ["Mo","Di","Mi","Do","Fr","Sa","So"];

    function getDayLabel(dateStr) {
      const d = new Date(dateStr);
      return DAY_LABELS[d.getDay() === 0 ? 6 : d.getDay() - 1];
    }

    function getLast7() {
      return Array.from({ length: 7 }, (_, i) => {
        const d = new Date(); d.setDate(d.getDate() - (6 - i));
        return d.toISOString().split("T")[0];
      });
    }

    function getLast30() {
      return Array.from({ length: 30 }, (_, i) => {
        const d = new Date(); d.setDate(d.getDate() - (29 - i));
        return d.toISOString().split("T")[0];
      });
    }

    function App() {
      const [habits, setHabits] = useState([]);
      const [view, setView] = useState("heute");
      const [selectedId, setSelectedId] = useState(null);
      const [editId, setEditId] = useState(null);
      const [newName, setNewName] = useState("");
      const [newEmoji, setNewEmoji] = useState("➕");
      const [newColor, setNewColor] = useState(ACCENT);
      const [newDesc, setNewDesc] = useState("");
      const [showDelete, setShowDelete] = useState(false);
      const [historyMode, setHistoryMode] = useState("30");
      const [showEmojiModal, setShowEmojiModal] = useState(false);
      const [newFreq, setNewFreq] = useState("daily"); // daily | weekly
      const [newDays, setNewDays] = useState([]); // 0=Mo,1=Di,...,6=So

      useEffect(() => {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (raw) setHabits(JSON.parse(raw));
        } catch(e) {}
      }, []);

      useEffect(() => {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(habits));
        } catch(e) {}
      }, [habits]);

      const today = getTodayStr();
      const last7 = getLast7();
      const last30 = getLast30();

      function toggle(id, date) {
        const d = date || today;
        setHabits(p => p.map(h => h.id !== id ? h : {
          ...h,
          completions: h.completions.includes(d)
            ? h.completions.filter(x => x !== d)
            : [...h.completions, d].sort()
        }));
      }

      function openAdd() {
        setEditId(null); setNewName(""); setNewEmoji("➕"); setNewColor(ACCENT); setNewDesc(""); setNewFreq("daily"); setNewDays([]);
        setView("add");
      }

      function openEdit(habit) {
        setEditId(habit.id); setNewName(habit.name); setNewEmoji(habit.emoji); setNewColor(habit.color); setNewDesc(habit.description || ""); setNewFreq(habit.freq || "daily"); setNewDays(habit.days || []);
        setView("add");
      }

      function saveHabit() {
        if (!newName.trim()) return;
        if (editId) {
          setHabits(p => p.map(h => h.id !== editId ? h : { ...h, name: newName.trim(), emoji: newEmoji, color: newColor, description: newDesc.trim(), freq: newFreq, days: newDays }));
          setSelectedId(editId);
          setView("detail");
        } else {
          setHabits(p => [...p, { id: Date.now().toString(), name: newName.trim(), emoji: newEmoji, color: newColor, description: newDesc.trim(), freq: newFreq, days: newDays, completions: [], createdAt: today }]);
          setView("heute");
        }
        setEditId(null); setNewName(""); setNewEmoji("➕"); setNewColor(ACCENT); setNewDesc(""); setNewFreq("daily"); setNewDays([]);
      }

      function deleteHabit(id) {
        setHabits(p => p.filter(h => h.id !== id));
        setView("heute"); setShowDelete(false);
      }

      const selected = habits.find(h => h.id === selectedId);
      const doneToday = habits.filter(h => h.completions.includes(today)).length;

      // ── DETAIL ──────────────────────────────────────────────────────────────
      if (view === "detail" && selected) {
        const streak = calcStreak(selected.completions, selected.freq, selected.days);
        const longest = calcLongestStreak(selected.completions);
        const total = selected.completions.length;
        const done = selected.completions.includes(today);

        const historyDays = historyMode === "30"
          ? last30
          : (() => {
              const earliestCompletion = selected.completions.length > 0
                ? selected.completions.slice().sort()[0]
                : selected.createdAt;
              const startStr = earliestCompletion < selected.createdAt ? earliestCompletion : selected.createdAt;
              const start = new Date(startStr);
              const totalDays = Math.floor((new Date(today) - start) / 86400000) + 1;
              return Array.from({ length: totalDays }, (_, i) => {
                const d = new Date(start); d.setDate(d.getDate() + i);
                return d.toISOString().split("T")[0];
              });
            })();

        return (
          <div style={{ background: BG, minHeight: "100vh", display: "flex", flexDirection: "column", maxWidth: 430, margin: "0 auto" }}>
            <div style={{ display: "flex", justifyContent: "space-between", padding: "52px 20px 8px" }}>
              <button style={gh} onClick={() => { setView("heute"); setShowDelete(false); }}>← Zurück</button>
              <div style={{ display: "flex", gap: 16 }}>
                <button style={{ ...gh, color: ACCENT }} onClick={() => openEdit(selected)}>Bearbeiten</button>
                <button style={{ ...gh, color: "#FF6B6B" }} onClick={() => setShowDelete(true)}>Löschen</button>
              </div>
            </div>
            <div style={{ flex: 1, overflowY: "auto", padding: "0 20px 120px" }}>
              <div style={{ textAlign: "center", marginBottom: 24 }}>
                <div style={{ width: 64, height: 64, borderRadius: 18, background: selected.color + "22", border: `2px solid ${selected.color}`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 30, margin: "0 auto" }}>{selected.emoji}</div>
                <h1 style={{ color: "#fff", fontSize: 28, fontWeight: 800, marginTop: 12 }}>{selected.name}</h1>
                {selected.description ? <p style={{ color: "rgba(255,255,255,0.5)", fontSize: 14, marginTop: 6, lineHeight: 1.5 }}>{selected.description}</p> : null}
                <p style={{ color: "rgba(255,255,255,0.4)", fontSize: 13, marginTop: 6 }}>seit {new Date(selected.createdAt).toLocaleDateString("de-DE", { day: "numeric", month: "long", year: "numeric" })}</p>
              </div>

              <div style={{ background: CARD, borderRadius: 18, display: "flex", justifyContent: "space-around", padding: "24px 16px", marginBottom: 12 }}>
                {[["🔥", streak + " Tage", "Aktuell"], ["🏆", longest + " Tage", "Rekord"], ["✅", total, "Gesamt"]].map(([ic, val, lbl]) => (
                  <div key={lbl} style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 6 }}>
                    <span style={{ fontSize: 26 }}>{ic}</span>
                    <div style={{ color: "#fff", fontWeight: 800, fontSize: 22 }}>{val}</div>
                    <div style={{ color: "rgba(255,255,255,0.4)", fontSize: 12 }}>{lbl}</div>
                  </div>
                ))}
              </div>

              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", margin: "20px 0 10px" }}>
                <span style={{ color: "#fff", fontWeight: 800, fontSize: 20 }}>Diese Woche</span>
              </div>
              <div style={{ background: CARD, borderRadius: 18, display: "flex", justifyContent: "space-between", padding: "16px 12px", marginBottom: 12 }}>
                {last7.map(d => {
                  const chk = selected.completions.includes(d);
                  const isFuture = d > today;
                  const wdow = new Date(d).getDay() === 0 ? 6 : new Date(d).getDay() - 1;
                  const wScheduled = !selected.freq || selected.freq === "daily" || !selected.days || selected.days.length === 0 || selected.days.includes(wdow);
                  return (
                    <div key={d} onClick={() => !isFuture && toggle(selected.id, d)}
                      style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 6, cursor: isFuture ? "default" : "pointer", opacity: isFuture ? 0.2 : !wScheduled ? 0.3 : 1 }}>
                      <div style={{ color: d === today ? ACCENT : "rgba(255,255,255,0.35)", fontSize: 11, fontWeight: d === today ? 700 : 400 }}>{getDayLabel(d)}</div>
                      <div style={{ width: 32, height: 32, borderRadius: 10, background: chk ? selected.color : CARD2, display: "flex", alignItems: "center", justifyContent: "center", color: "#000", fontWeight: 800, border: d === today ? `2px solid ${chk ? selected.color : "rgba(255,255,255,0.3)"}` : "2px solid transparent" }}>{chk ? "✓" : ""}</div>
                    </div>
                  );
                })}
              </div>

              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", margin: "20px 0 10px" }}>
                <span style={{ color: "#fff", fontWeight: 800, fontSize: 20 }}>Verlauf</span>
                <div style={{ display: "flex", gap: 6 }}>
                  {[["30", "30 Tage"], ["all", "Gesamt"]].map(([mode, label]) => (
                    <button key={mode} onClick={() => setHistoryMode(mode)}
                      style={{ padding: "5px 12px", borderRadius: 8, border: "none", fontSize: 12, fontWeight: 700, cursor: "pointer", background: historyMode === mode ? selected.color : CARD2, color: historyMode === mode ? "#000" : "rgba(255,255,255,0.5)", transition: "all 0.2s" }}>
                      {label}
                    </button>
                  ))}
                </div>
              </div>
              <div style={{ background: CARD, borderRadius: 18, padding: 16, marginBottom: 12 }}>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                  {historyDays.map(d => {
                    const chk = selected.completions.includes(d);
                    const isFuture = d > today;
                    const hdow = new Date(d).getDay() === 0 ? 6 : new Date(d).getDay() - 1;
                    const hScheduled = !selected.freq || selected.freq === "daily" || !selected.days || selected.days.length === 0 || selected.days.includes(hdow);
                    return (
                      <div key={d} title={d} onClick={() => !isFuture && toggle(selected.id, d)}
                        style={{ width: 26, height: 26, borderRadius: 6, background: chk ? selected.color : CARD2, cursor: isFuture ? "default" : "pointer", opacity: isFuture ? 0.2 : !hScheduled ? 0.3 : 1, display: "flex", alignItems: "center", justifyContent: "center" }}>
                        {chk ? <span style={{ color: "#000", fontSize: 12, fontWeight: 800 }}>✓</span> : null}
                      </div>
                    );
                  })}
                </div>
              </div>

              <button onClick={() => toggle(selected.id)}
                style={{ width: "100%", padding: 16, borderRadius: 14, border: "none", fontSize: 16, fontWeight: 700, cursor: "pointer", marginTop: 6, background: done ? CARD2 : selected.color, color: done ? "rgba(255,255,255,0.5)" : "#000" }}>
                {done ? "✓ Heute erledigt – rückgängig machen" : `${selected.emoji} Heute abhaken`}
              </button>
            </div>
            {showDelete && (
              <div style={overlay}>
                <div style={{ background: CARD, borderRadius: 24, padding: "32px 24px", width: "100%", maxWidth: 320, textAlign: "center" }}>
                  <div style={{ fontSize: 40, marginBottom: 8 }}>🗑️</div>
                  <p style={{ color: "#fff", fontWeight: 700, fontSize: 18, marginBottom: 6 }}>Habit löschen?</p>
                  <p style={{ color: "rgba(255,255,255,0.4)", fontSize: 14, marginBottom: 24 }}>Alle Daten gehen verloren.</p>
                  <button onClick={() => deleteHabit(selected.id)} style={{ width: "100%", padding: 16, borderRadius: 14, border: "none", fontSize: 16, fontWeight: 700, cursor: "pointer", background: "#FF6B6B", color: "#fff", marginBottom: 10 }}>Löschen</button>
                  <button onClick={() => setShowDelete(false)} style={{ width: "100%", padding: 16, borderRadius: 14, border: "none", fontSize: 16, fontWeight: 700, cursor: "pointer", background: CARD2, color: "rgba(255,255,255,0.6)" }}>Abbrechen</button>
                </div>
              </div>
            )}
          </div>
        );
      }

      // ── ADD / EDIT ───────────────────────────────────────────────────────────
      if (view === "add") {
        const isEdit = !!editId;
        return (
          <div style={{ background: BG, minHeight: "100vh", display: "flex", flexDirection: "column", maxWidth: 430, margin: "0 auto" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "52px 20px 8px" }}>
              <button style={gh} onClick={() => { setView(isEdit ? "detail" : "heute"); setEditId(null); }}>← Zurück</button>
              <span style={{ color: "#fff", fontWeight: 700, fontSize: 17 }}>{isEdit ? "Habit bearbeiten" : "Neuer Habit"}</span>
              <div style={{ width: 60 }} />
            </div>
            <div style={{ flex: 1, overflowY: "auto", padding: "0 20px 120px" }}>
              <div style={{ background: CARD, borderRadius: 18, display: "flex", alignItems: "center", gap: 14, padding: "18px 20px", marginBottom: 8 }}>
                <div onClick={() => setShowEmojiModal(true)} style={{ width: 56, height: 56, borderRadius: 16, background: newColor + "22", border: `2px solid ${newColor}`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 26, cursor: "pointer", flexShrink: 0 }}>{newEmoji}</div>
                <div>
                  <div style={{ color: "#fff", fontWeight: 700, fontSize: 17 }}>{newName || "Mein Habit"}</div>
                  <div style={{ color: "rgba(255,255,255,0.35)", fontSize: 12, marginTop: 2 }}>Emoji antippen zum Ändern</div>
                </div>
              </div>

              {showEmojiModal && (
                <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.85)", display: "flex", alignItems: "flex-end", justifyContent: "center", zIndex: 200 }}>
                  <div style={{ background: "#1C1C1E", borderRadius: "24px 24px 0 0", width: "100%", maxWidth: 430, maxHeight: "70vh", display: "flex", flexDirection: "column" }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "20px 20px 12px" }}>
                      <span style={{ color: "#fff", fontWeight: 800, fontSize: 18 }}>Emoji wählen</span>
                      <button onClick={() => setShowEmojiModal(false)}
                        style={{ background: CARD2, border: "none", color: "rgba(255,255,255,0.6)", fontSize: 16, fontWeight: 700, cursor: "pointer", borderRadius: 10, width: 32, height: 32, display: "flex", alignItems: "center", justifyContent: "center" }}>✕</button>
                    </div>
                    <div style={{ overflowY: "auto", padding: "0 16px 32px" }}>
                      <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
                        {ALL_EMOJIS.map(e => (
                          <button key={e} onClick={() => { setNewEmoji(e); setShowEmojiModal(false); }}
                            style={{ width: 48, height: 48, borderRadius: 12, border: "none", fontSize: 24, cursor: "pointer", background: newEmoji === e ? newColor + "44" : CARD2, outline: newEmoji === e ? `2px solid ${newColor}` : "none" }}>
                            {e}
                          </button>
                        ))}
                      </div>
                    </div>
                  </div>
                </div>
              )}

              <p style={fieldLbl}>Name</p>
              <div style={{ background: CARD, borderRadius: 18, marginBottom: 4 }}>
                <input style={{ background: "none", border: "none", color: "#fff", fontSize: 17, width: "100%", padding: "14px 16px", outline: "none" }}
                  placeholder="z.B. Wasser trinken" value={newName} onChange={e => setNewName(e.target.value)} maxLength={40} />
              </div>

              <p style={fieldLbl}>Kurzbeschreibung <span style={{ color: "rgba(255,255,255,0.25)", fontWeight: 400, textTransform: "none", letterSpacing: 0 }}>(optional)</span></p>
              <div style={{ background: CARD, borderRadius: 18, marginBottom: 4 }}>
                <textarea style={{ background: "none", border: "none", color: "#fff", fontSize: 15, width: "100%", padding: "14px 16px", outline: "none", resize: "none", minHeight: 80, fontFamily: "inherit" }}
                  placeholder="z.B. Jeden Morgen 2 Gläser Wasser trinken" value={newDesc} onChange={e => setNewDesc(e.target.value)} maxLength={120} />
              </div>



              <p style={fieldLbl}>Farbe</p>
              <div style={{ background: CARD, borderRadius: 18, padding: 16, marginBottom: 4 }}>
                <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
                  {COLORS.map(c => (
                    <button key={c} onClick={() => setNewColor(c)}
                      style={{ width: 36, height: 36, borderRadius: "50%", background: c, border: "none", cursor: "pointer", outline: newColor === c ? "3px solid #fff" : "3px solid transparent", outlineOffset: 2 }} />
                  ))}
                </div>
              </div>

              <p style={fieldLbl}>Häufigkeit</p>
              <div style={{ background: CARD, borderRadius: 18, overflow: "hidden", marginBottom: 4 }}>
                {[["daily", "Täglich"], ["weekly", "Mehrmals pro Woche"]].map(([val, label]) => (
                  <div key={val} onClick={() => { setNewFreq(val); if(val==="daily") setNewDays([]); }}
                    style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "14px 16px", borderBottom: val==="daily" ? "1px solid rgba(255,255,255,0.06)" : "none", cursor: "pointer" }}>
                    <span style={{ color: "#fff", fontSize: 15 }}>{label}</span>
                    <div style={{ width: 22, height: 22, borderRadius: "50%", border: `2px solid ${newFreq===val ? newColor : "rgba(255,255,255,0.2)"}`, background: newFreq===val ? newColor : "none", display: "flex", alignItems: "center", justifyContent: "center" }}>
                      {newFreq===val && <span style={{ color: "#000", fontSize: 13, fontWeight: 800 }}>✓</span>}
                    </div>
                  </div>
                ))}
              </div>

              {newFreq === "weekly" && (
                <div style={{ background: CARD, borderRadius: 18, padding: 16, marginBottom: 4 }}>
                  <div style={{ display: "flex", justifyContent: "space-between" }}>
                    {["Mo","Di","Mi","Do","Fr","Sa","So"].map((day, i) => {
                      const active = newDays.includes(i);
                      return (
                        <div key={i} onClick={() => setNewDays(p => p.includes(i) ? p.filter(x=>x!==i) : [...p,i].sort())}
                          style={{ width: 38, height: 38, borderRadius: 10, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13, fontWeight: 700,
                            background: active ? newColor : CARD2, color: active ? "#000" : "rgba(255,255,255,0.4)" }}>
                          {day}
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}

              <button onClick={saveHabit} disabled={!newName.trim()}
                style={{ width: "100%", padding: 16, borderRadius: 14, border: "none", fontSize: 16, fontWeight: 700, cursor: "pointer", marginTop: 16, background: newName.trim() ? ACCENT : CARD2, color: newName.trim() ? "#000" : "rgba(255,255,255,0.3)" }}>
                {isEdit ? "Änderungen speichern ✓" : "Habit erstellen ✓"}
              </button>
            </div>
          </div>
        );
      }

      // ── DASHBOARD ────────────────────────────────────────────────────────────
      return (
        <div style={{ background: BG, minHeight: "100vh", display: "flex", flexDirection: "column", maxWidth: 430, margin: "0 auto" }}>
          <div style={{ flex: 1, overflowY: "auto", padding: "0 20px 120px" }}>

            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", paddingTop: 52, marginBottom: 12 }}>
              <span style={{ color: "#fff", fontWeight: 800, fontSize: 22 }}>Übersicht</span>
              <span style={{ color: ACCENT, fontSize: 15, fontWeight: 600 }}>{doneToday} / {habits.length} heute</span>
            </div>

            {habits.length > 0 && (
              <div style={{ background: CARD, borderRadius: 18, padding: 16, marginBottom: 12 }}>
                <div style={{ display: "grid", gridTemplateColumns: "1fr repeat(7, 28px)", gap: 4, alignItems: "center", marginBottom: 10 }}>
                  <div />
                  {last7.map(d => (
                    <div key={d} style={{ color: d === today ? ACCENT : "rgba(255,255,255,0.35)", fontSize: 11, fontWeight: d === today ? 700 : 400, textAlign: "center" }}>
                      {getDayLabel(d)}
                    </div>
                  ))}
                </div>
                {habits.map((habit, i) => {
                  const streak = calcStreak(habit.completions, habit.freq, habit.days);
                  return (
                    <div key={habit.id} style={{ display: "grid", gridTemplateColumns: "1fr repeat(7, 28px)", gap: 4, alignItems: "center", marginBottom: i < habits.length - 1 ? 10 : 0 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 8, overflow: "hidden", cursor: "pointer" }}
                        onClick={() => { setSelectedId(habit.id); setView("detail"); setHistoryMode("30"); }}>
                        <span style={{ fontSize: 18, flexShrink: 0 }}>{habit.emoji}</span>
                        <div style={{ overflow: "hidden" }}>
                          <div style={{ color: "#fff", fontSize: 13, fontWeight: 600, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{habit.name}</div>
                          <div style={{ color: streak > 0 ? habit.color : "rgba(255,255,255,0.3)", fontSize: 10 }}>{streak > 0 ? `🔥 ${streak}d` : "–"}</div>
                        </div>
                      </div>
                      {last7.map(d => {
                        const checked = habit.completions.includes(d);
                        const isToday = d === today;
                        const isFuture = d > today;
                        const dow = new Date(d).getDay() === 0 ? 6 : new Date(d).getDay() - 1;
                        const isScheduled = !habit.freq || habit.freq === "daily" || !habit.days || habit.days.length === 0 || habit.days.includes(dow);
                        return (
                          <div key={d} onClick={e => { if (!isFuture) { e.stopPropagation(); toggle(habit.id, d); } }}
                            style={{ width: 28, height: 28, borderRadius: 8, background: checked ? habit.color : CARD2, border: isToday ? `2px solid ${checked ? habit.color : "rgba(255,255,255,0.2)"}` : "2px solid transparent", display: "flex", alignItems: "center", justifyContent: "center", cursor: isFuture ? "default" : "pointer", opacity: isFuture ? 0.2 : !isScheduled ? 0.3 : 1 }}>
                            {checked ? <span style={{ fontWeight: 800, fontSize: 13, color: "#000" }}>✓</span> : null}
                          </div>
                        );
                      })}
                    </div>
                  );
                })}
              </div>
            )}

            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 24, marginBottom: 10 }}>
              <span style={{ color: "#fff", fontWeight: 800, fontSize: 22 }}>Meine Habits</span>
              <button onClick={openAdd} style={{ background: ACCENT, border: "none", borderRadius: 10, padding: "6px 14px", color: "#000", fontWeight: 700, fontSize: 13, cursor: "pointer" }}>＋ Hinzufügen</button>
            </div>

            {habits.length === 0 ? (
              <div style={{ background: CARD, borderRadius: 18, textAlign: "center", padding: 40 }}>
                <div style={{ fontSize: 40, marginBottom: 12 }}>🌱</div>
                <p style={{ color: "rgba(255,255,255,0.4)", lineHeight: 1.6, fontSize: 14 }}>Noch keine Habits.<br />Leg jetzt deinen ersten an!</p>
              </div>
            ) : habits.map(habit => {
              const done = habit.completions.includes(today);
              return (
                <div key={habit.id} style={{ background: CARD, borderRadius: 18, overflow: "hidden", marginBottom: 10 }}>
                  <div style={{ display: "flex", alignItems: "center", padding: "14px 16px", gap: 14, cursor: "pointer" }}
                    onClick={() => { setSelectedId(habit.id); setView("detail"); setHistoryMode("30"); }}>
                    <div style={{ width: 4, height: 48, borderRadius: 99, background: habit.color, flexShrink: 0 }} />
                    <div style={{ width: 44, height: 44, borderRadius: 13, background: habit.color + "22", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 22 }}>{habit.emoji}</div>
                    <div style={{ flex: 1, overflow: "hidden" }}>
                      <div style={{ color: "#fff", fontWeight: 700, fontSize: 16 }}>{habit.name} →</div>
                      {habit.description ? <div style={{ color: "rgba(255,255,255,0.4)", fontSize: 12, marginTop: 2, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{habit.description}</div> : null}
                    </div>
                    <div style={{ display: "flex", gap: 4 }}>
                      {getLast7().map(d => (
                        <div key={d} style={{ width: 7, height: 7, borderRadius: "50%", background: habit.completions.includes(d) ? habit.color : CARD2 }} />
                      ))}
                    </div>
                    <button style={{ width: 38, height: 38, borderRadius: 12, background: done ? habit.color : CARD2, border: "none", color: done ? "#000" : "rgba(255,255,255,0.3)", fontSize: 18, fontWeight: 800, cursor: "pointer", flexShrink: 0 }}
                      onClick={e => { e.stopPropagation(); toggle(habit.id); }}>
                      {done ? "✓" : ""}
                    </button>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    const gh = { background: "none", border: "none", color: "rgba(255,255,255,0.5)", fontSize: 15, cursor: "pointer", padding: 0 };
    const fieldLbl = { color: "rgba(255,255,255,0.4)", fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: 1, marginBottom: 6, marginTop: 16, display: "block" };
    const overlay = { position: "fixed", inset: 0, background: "rgba(0,0,0,0.8)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 100, padding: 24 };

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
